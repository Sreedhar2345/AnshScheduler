name: TaskReminderApp
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.saiansh.TaskReminderApp
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
configs:
  Debug: debug
  Release: release
targets:
  TaskReminderApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TaskReminderApp
        excludes:
          - Info.plist
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TaskReminderApp/Info.plist
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Allow photo access to attach an image to each scheduled task.
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - TaskReminderAppTests
        - TaskReminderAppUITests
  TaskReminderAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TaskReminderAppTests
    dependencies:
      - target: TaskReminderApp
  TaskReminderAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TaskReminderAppUITests
    dependencies:
      - target: TaskReminderApp
