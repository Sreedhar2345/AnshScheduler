name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project TaskReminderApp.xcodeproj \
            -scheme TaskReminderApp \
            -configuration Release \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project TaskReminderApp.xcodeproj \
            -scheme TaskReminderApp \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO

  # Uncomment and configure secrets for TestFlight / App Store deploy:
  # APP_STORE_CONNECT_API_KEY_ID, APP_STORE_CONNECT_ISSUER_ID,
  # APP_STORE_CONNECT_API_KEY (base64), MATCH_PASSWORD, etc.
